info:
  contact: {}
  description: Hive management plane API for nodes and subscriptions.
  title: Hive Node Registry API
  version: 0.1.0
paths:
  /:
    get:
      description: 返回 Hive Registry 首页 HTML
      operationId: Dashboard
      produces:
      - text/html
      responses:
        "200":
          description: HTML page
          schema:
            type: string
      summary: 首页
      tags:
      - dashboard
  /admin/announcements:
    get:
      description: 分页获取所有公告，按置顶和创建时间排序
      operationId: AdminListAnnouncements
      parameters:
      - description: 页码（默认 1）
        in: query
        name: page
        type: integer
      - description: 每页数量（默认 20，最大 100）
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.AnnouncementListResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - AdminSessionCookie: []
      summary: 获取公告列表
      tags:
      - admin
    post:
      consumes:
      - application/json
      description: 创建新公告，level 可选 info/warning/critical
      operationId: AdminCreateAnnouncement
      parameters:
      - description: 公告信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.AnnouncementRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Announcement'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - AdminSessionCookie: []
      summary: 创建公告
      tags:
      - admin
  /admin/announcements/{id}:
    delete:
      description: 根据 ID 删除公告
      operationId: AdminDeleteAnnouncement
      parameters:
      - description: 公告 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.StatusResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - AdminSessionCookie: []
      summary: 删除公告
      tags:
      - admin
    patch:
      consumes:
      - application/json
