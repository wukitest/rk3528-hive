            $ref: '#/definitions/handler.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - CustomerSessionCookie: []
      summary: 获取工单详情及回复
      tags:
      - portal
  /portal/tickets/{id}/reply:
    post:
      consumes:
      - application/json
      operationId: PortalReplyTicket
      parameters:
      - description: 工单 ID
        in: path
        name: id
        required: true
        type: integer
      - description: 回复内容
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.PortalReplyTicketRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.StatusResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - CustomerSessionCookie: []
      summary: 客户回复工单
      tags:
      - portal
  /prometheus-targets:
    get:
      description: 返回 file_sd 格式的节点列表，供 Prometheus 服务发现使用
      operationId: PrometheusTargets
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handler.PrometheusTarget'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      security:
      - AdminSessionCookie: []
      summary: 获取 Prometheus 抓取目标
      tags:
      - admin
  /s/{token}:
    get:
      description: 通过 Token 获取订阅组的 Clash YAML 配置（无需认证）
      operationId: PublicGroupClash
      parameters:
      - description: 订阅组 Token
        in: path
        name: token
        required: true
        type: string
      produces:
      - text/plain
      responses:
        "200":
          description: Clash subscription
          schema:
            type: string
        "404":
          description: Not Found
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: 公开订阅组 Clash 配置
      tags:
      - subscription
  /subscription:
    get:
      description: 返回 base64 编码的 VLESS 订阅链接
      operationId: SubscriptionVless
      produces:
      - text/plain
      responses:
        "200":
          description: VLESS subscription
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      summary: 获取 VLESS 订阅
      tags:
      - subscription
  /subscription/clash:
    get:
      description: 返回 Clash/Mihomo YAML 格式订阅配置
      operationId: SubscriptionClash
      produces:
      - text/plain
      responses:
        "200":
          description: Clash subscription
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handler.ErrorResponse'
      summary: 获取 Clash 订阅
      tags:
      - subscription
schemes:
- https
- http
securityDefinitions:
  AdminSessionCookie:
    description: '"HttpOnly session cookie for admin UI"'
    in: cookie
    name: hive_admin_session
    type: apiKey
  BearerAuth:
    description: '"Authorization: Bearer <API_SECRET>"'
    in: header
    name: Authorization
    type: apiKey
  CustomerSessionCookie:
    description: '"HttpOnly session cookie for customer portal"'
    in: cookie
    name: hive_customer_session
    type: apiKey
